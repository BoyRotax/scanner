<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Entry - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e30613; --yellow: #FFD700; --bg: #000; --card: #1a1a1a; --gray: #888; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        
        .header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back { color: var(--gray); text-decoration: none; border: 1px solid #444; padding: 5px 15px; border-radius: 8px; font-size: 0.9rem; }

        .form-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        /* Grid Layout for Inputs */
        .section-title { color: var(--yellow); font-size: 1rem; margin: 20px 0 10px 0; border-left: 4px solid var(--red); padding-left: 10px; text-transform: uppercase; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; color: var(--gray); font-size: 0.75rem; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--yellow); }
        
        .kart-input { font-size: 2.5rem; text-align: center; color: var(--yellow); font-weight: 900; border: 2px solid var(--red); }
        .driver-info { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; display: none; }
        .driver-name { font-size: 1.5rem; font-weight: bold; }

        .btn-save { width: 100%; padding: 20px; background: var(--red); color: white; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin: 20px 0; }
        
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.4rem;">🔧 MANUAL EDIT</h1>
            <p style="margin:0; font-size: 0.75rem; color: var(--gray);">แก้ไขข้อมูลอุปกรณ์รายบุคคล</p>
        </div>
        <a href="scanner.html" class="btn-back">BACK</a>
    </div>

    <div class="form-card">
        <label style="text-align: center;">KART NUMBER</label>
        <input type="number" id="kartNo" class="kart-input" placeholder="000" oninput="searchDriver()">

        <div id="driverBox" class="driver-info">
            <div class="driver-name" id="driverName">--</div>
        </div>

        <div class="section-title">Engine & Chassis</div>
        <div class="grid-container">
            <div class="input-group"><label>CHASSIS NO.</label><input type="text" id="chassis_no"></div>
            <div class="input-group"><label>ENGINE 1</label><input type="text" id="engine_1"></div>
            <div class="input-group"><label>ENGINE 2</label><input type="text" id="engine_2"></div>
            <div class="input-group"><label>CYLINDER NO. 1</label><input type="text" id="cylinder_1"></div>
            <div class="input-group"><label>CYLINDER NO. 2</label><input type="text" id="cylinder_2"></div>
        </div>

        <div class="section-title">Seals</div>
        <div class="grid-container">
            <div class="input-group"><label>SEAL 1</label><input type="text" id="seal_1"></div>
            <div class="input-group"><label>SEAL 2</label><input type="text" id="seal_2"></div>
            <div class="input-group"><label>SEAL EXHAUST</label><input type="text" id="seal_exhaust"></div>
        </div>

        <div class="section-title">Tyres (Dry)</div>
        <div class="grid-container">
            <div class="input-group"><label>TYRE BARCODE (Main)</label><input type="text" id="tyre_barcode"></div>
            <div class="input-group"><label>DRY SPARE</label><input type="text" id="tyre_barcode_dry_spare"></div>
            <div class="input-group"><label>DRY 2</label><input type="text" id="tyre_barcode_dry2"></div>
            <div class="input-group"><label>DRY 3</label><input type="text" id="tyre_barcode_dry3"></div>
            <div class="input-group"><label>DRY 4</label><input type="text" id="tyre_barcode_dry4"></div>
            <div class="input-group"><label>DRY 5</label><input type="text" id="tyre_barcode_dry5"></div>
            <div class="input-group"><label>DRY 6</label><input type="text" id="tyre_barcode_dry6"></div>
            <div class="input-group"><label>DRY 7</label><input type="text" id="tyre_barcode_dry7"></div>
            <div class="input-group"><label>DRY 8</label><input type="text" id="tyre_barcode_dry8"></div>
        </div>

        <div class="section-title">Tyres (Wet)</div>
        <div class="grid-container">
            <div class="input-group"><label>WET 1</label><input type="text" id="tyre_barcode_wet1"></div>
            <div class="input-group"><label>WET 2</label><input type="text" id="tyre_barcode_wet2"></div>
            <div class="input-group"><label>WET 3</label><input type="text" id="tyre_barcode_wet3"></div>
            <div class="input-group"><label>WET 4</label><input type="text" id="tyre_barcode_wet4"></div>
            <div class="input-group"><label>WET 5</label><input type="text" id="tyre_barcode_wet5"></div>
        </div>

        <button class="btn-save" onclick="saveData()">💾 UPDATE ALL DATA</button>
        <div id="statusMsg" style="text-align: center; color: var(--green);"></div>
    </div>
</div>

<script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
    
    // รายการฟิลด์ทั้งหมดที่คุณต้องการจัดการ
    const fieldIds = [
        'engine_1', 'engine_2', 'seal_1', 'seal_2', 'seal_exhaust',
        'tyre_barcode', 'tyre_barcode_dry_spare', 'tyre_barcode_dry2', 'tyre_barcode_dry3', 
        'tyre_barcode_dry4', 'tyre_barcode_dry5', 'tyre_barcode_dry6', 'tyre_barcode_dry7', 'tyre_barcode_dry8',
        'tyre_barcode_wet1', 'tyre_barcode_wet2', 'tyre_barcode_wet3', 'tyre_barcode_wet4', 'tyre_barcode_wet5',
        'chassis_no', 'cylinder_1', 'cylinder_2'
    ];

    let db = JSON.parse(localStorage.getItem('rotax_search_index')) || {};

    function searchDriver() {
        const kart = document.getElementById('kartNo').value;
        const driverBox = document.getElementById('driverBox');
        const driverName = document.getElementById('driverName');
        
        fieldIds.forEach(id => document.getElementById(id).value = ''); // ล้างค่าเก่า

        if (!kart) { driverBox.style.display = 'none'; return; }

        let foundName = "";
        Object.entries(db).forEach(([barcode, info]) => {
            if (info.kartNo == kart) {
                foundName = info.driver;
                const typeKey = info.type.toLowerCase();
                // จับคู่ฟิลด์จาก type
                if (fieldIds.includes(typeKey)) document.getElementById(typeKey).value = barcode;
                // กรณีพิเศษ Cylinder / Chassis
                if (typeKey === 'cylinder_number_1') document.getElementById('cylinder_1').value = barcode;
                if (typeKey === 'cylinder_number_2') document.getElementById('cylinder_2').value = barcode;
                if (typeKey === 'chassis_no') document.getElementById('chassis_no').value = barcode;
            }
        });

        if (foundName) {
            driverName.innerText = foundName;
            driverBox.style.display = 'block';
        } else {
            driverName.innerText = "KART NOT FOUND";
            driverBox.style.display = 'block';
        }
    }

    function saveData() {
        const kart = document.getElementById('kartNo').value;
        const name = document.getElementById('driverName').innerText;
        if (!kart || name === "KART NOT FOUND") return alert("Please enter a valid Kart Number");

        // ลบข้อมูลเก่าของคันนี้ออกก่อน
        Object.keys(db).forEach(key => { if (db[key].kartNo == kart) delete db[key]; });

        // บันทึกข้อมูลใหม่
        fieldIds.forEach(id => {
            const val = document.getElementById(id).value.trim().toUpperCase();
            if (val) {
                db[val] = { kartNo: kart, driver: name, type: id.toUpperCase() };
            }
        });

        localStorage.setItem('rotax_search_index', JSON.stringify(db));
        document.getElementById('statusMsg').innerText = "✅ DATA UPDATED SUCCESSFULLY!";
        setTimeout(() => { document.getElementById('statusMsg').innerText = ""; }, 3000);
    }
</script>
</body>
</html>
