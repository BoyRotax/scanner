<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e30613; --yellow: #FFD700; --bg: #000; --dark: #111; --border: #222; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* Navigation */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0a0a0a; border-bottom: 2px solid var(--border); }
        .nav-brand-group { display: flex; flex-direction: column; }
        .nav-brand { font-weight: 900; color: var(--red); font-size: 1.4rem; line-height: 1; }
        .nav-company { font-size: 0.65rem; color: #555; letter-spacing: 1px; font-weight: bold; margin-top: 4px; }
        
        .nav-menu { display: flex; gap: 8px; overflow-x: auto; }
        .nav-item { text-decoration: none; color: #777; font-size: 0.75rem; border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-weight: bold; white-space: nowrap; text-transform: uppercase; }
        .nav-item.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255, 215, 0, 0.1); }
        .nav-menu::-webkit-scrollbar { display: none; }

        .status-bar { display: flex; justify-content: flex-end; padding: 8px 20px; background: #050505; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        #txtTime { color: var(--yellow); font-weight: 900; margin-left: 15px; font-family: monospace; }

        /* Content */
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-action { background: none; border: 1px solid #444; color: #ccc; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        
        .btn-csv { border-color: #4ade80; color: #4ade80; }
        .btn-csv:hover { background: #4ade80; color: black; }
        
        .btn-pdf { border-color: #3b82f6; color: #3b82f6; }
        .btn-pdf:hover { background: #3b82f6; color: white; }

        .btn-clear { border-color: var(--red); color: var(--red); }
        .btn-clear:hover { background: var(--red); color: white; }

        /* History List */
        .history-card { background: var(--dark); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .log-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .log-item.err { border-left: 4px solid var(--red); }
        .log-item.ok { border-left: 4px solid #4ade80; }

        .log-date-box { min-width: 80px; text-align: center; border-right: 1px solid #222; margin-right: 20px; padding-right: 10px; }
        .log-date { font-size: 0.7rem; color: #555; font-weight: bold; }
        .log-time { font-family: monospace; font-size: 1rem; color: var(--yellow); font-weight: bold; }

        .log-main { flex: 1; }
        .log-title { font-weight: bold; font-size: 1.1rem; }
        .log-title b { color: var(--yellow); margin-right: 5px; }
        .log-sub { font-size: 0.8rem; color: #666; margin-top: 3px; }

        .log-status { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; }
        .status-ok { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .status-err { background: rgba(227, 6, 19, 0.1); color: var(--red); }

        .empty-state { padding: 80px; text-align: center; color: #333; }

        /* 🖨️ CSS สำหรับการ Print เป็น PDF */
        @media print {
            body { background: white !important; color: black !important; }
            .navbar, .status-bar, .btn-group, .nav-menu { display: none !important; }
            .container { max-width: 100%; padding: 0; }
            .history-card { border: 1px solid #ccc !important; background: white !important; }
            .log-item { border-bottom: 1px solid #eee !important; background: white !important; page-break-inside: avoid; }
            .log-title, .log-title b, .log-time { color: black !important; }
            .log-sub { color: #666 !important; }
            .header-flex h2 { color: black !important; }
            .header-flex::after { content: "Scanned by Moments Media Organizing"; font-size: 10px; color: #999; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand-group">
            <div class="nav-brand">ROTAX ASIA</div>
            <div class="nav-company">MOMENTS MEDIA ORGANIZING</div>
        </div>
        <div class="nav-menu">
            <a href="scanner.html" class="nav-item">SCANNER</a>
            <a href="admin.html" class="nav-item">ADMIN</a>
            <a href="view-database.html" class="nav-item">VIEW</a>
            <a href="history.html" class="nav-item active">HISTORY</a>
        </div>
    </nav>

    <div class="status-bar">
        <span id="txtDate" style="color:#666">-- --- ----</span>
        <span id="txtTime">00:00:00</span>
    </div>

    <div class="container">
        <div class="header-flex">
            <h2 style="margin:0; font-size:1.5rem;">SCAN HISTORY</h2>
            <div class="btn-group">
                <button class="btn-action btn-csv" onclick="exportCSV()">📊 CSV</button>
                <button class="btn-action btn-pdf" onclick="window.print()">📄 PDF</button>
                <button class="btn-action btn-clear" onclick="clearLogs()">🗑️ CLEAR</button>
            </div>
        </div>

        <div class="history-card" id="logContainer"></div>
        <div id="emptyMsg" class="empty-state" style="display:none;">📜<br>ไม่มีประวัติการสแกน</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('txtDate').innerText = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
            document.getElementById('txtTime').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000); updateClock();

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('scan_logs')) || [];
            const container = document.getElementById('logContainer');
            const emptyMsg = document.getElementById('emptyMsg');
            if (logs.length === 0) { container.style.display = 'none'; emptyMsg.style.display = 'block'; return; }
            container.style.display = 'block'; emptyMsg.style.display = 'none';
            container.innerHTML = logs.map(log => `
                <div class="log-item ${log.status === 'ERR' ? 'err' : 'ok'}">
                    <div class="log-date-box">
                        <div class="log-date">${log.date || "N/A"}</div>
                        <div class="log-time">${log.time || "--:--:--"}</div>
                    </div>
                    <div class="log-main">
                        <div class="log-title"><b>#${log.kart}</b> ${log.name}</div>
                        <div class="log-sub">${log.type}: ${log.code}</div>
                    </div>
                    <div class="log-status ${log.status === 'ERR' ? 'status-err' : 'status-ok'}">
                        ${log.status === 'ERR' ? 'FAILED' : 'VERIFIED'}
                    </div>
                </div>
            `).join('');
        }

        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('scan_logs')) || [];
            if (logs.length === 0) return alert("ไม่มีข้อมูลครับ");
            let csv = "\uFEFFTime,Date,Kart,Name,Barcode,Type,Status\n";
            logs.forEach(log => {
                csv += `"${log.time}","${log.date}","${log.kart}","${log.name}","${log.code}","${log.type}","${log.status}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rotax_report_${new Date().getTime()}.csv`;
            a.click();
        }

        function clearLogs() {
            if(confirm("ล้างประวัติทั้งหมด?")) { localStorage.removeItem('scan_logs'); renderLogs(); }
        }

        window.onload = renderLogs;
    </script>
</body>
</html>
