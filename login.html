<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #e30613; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b3050f; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="color:#e30613">ROTAX ASIA</h1>
        <p style="font-size: 1rem; color: #888;">Technical Inspection System</p>
        <p style="font-size: .8rem; color:#e30613;">MOMENTS MEDIA ORGANIZING</p>
        
        <input type="password" id="pw" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <script>
        // ฟังก์ชันช่วยเข้ารหัส (Base64 แบบย้อนกลับ) เพื่อซ่อนรหัสจริง
        function checkPass(input) {
            return btoa(input).split('').reverse().join('');
        }

        function login() {
            const passInput = document.getElementById('pw').value;
            
            // นี่คือค่าที่เข้ารหัสของ 'rotax2026'
            const secretHash = "NjIwMnhhdG9y";

            if (checkPass(passInput) === secretHash) {
                // เก็บสถานะว่าล็อกอินแล้ว
                sessionStorage.setItem('isLoggedIn', 'true');
                // ย้ายไปหน้าสแกนเนอร์ (ย้ำ: ไฟล์ต้องชื่อ scanner.html ตัวเล็กหมดนะครับ)
                window.location.href = 'scanner.html';
            } else {
                alert('รหัสผ่านไม่ถูกต้อง หรือลืมเปลี่ยนภาษาครับ');
                document.getElementById('pw').value = '';
            }
        }

        // เสริม: กด Enter ที่คีย์บอร์ดแล้วล็อกอินได้เลย
        document.getElementById('pw').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
