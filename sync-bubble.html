<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Full Data Sync - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e30613; --green: #4ade80; --yellow: #FFD700; }
        body { font-family: 'Kanit', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 1000px; margin: auto; }
        .btn { background: var(--red); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .status { margin-top: 15px; padding: 15px; background: #222; border-radius: 8px; border-left: 5px solid var(--red); font-size: 0.9rem; }
        .preview-table { margin-top: 20px; width: 100%; border-collapse: collapse; display: none; background: #111; font-size: 0.8rem; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        th { background: #222; color: var(--yellow); }
        .tag { display: inline-block; background: #444; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin: 2px; color: var(--green); }
    </small></style>
</head>
<body>

<div class="card">
    <h2>🚀 FULL DATA SYNC (MASTER LIST)</h2>
    <p style="color:#888;">กำลังใช้โหมดดึงข้อมูล 57 ฟิลด์ตามโครงสร้างระบบ</p>
    
    <button class="btn" onclick="syncAllData()">🔄 START FULL SYNC</button>
    
    <div id="status" class="status">รอการสั่งงาน...</div>

    <table id="previewTable" class="preview-table">
        <thead>
            <tr>
                <th>KART</th>
                <th>DRIVER</th>
                <th>BARCODES FOUND</th>
            </tr>
        </thead>
        <tbody id="previewBody"></tbody>
    </table>
    
    <button id="btnSave" class="btn" style="background:var(--green); color:black; margin-top:20px; display:none;" onclick="saveToLocal()">💾 SAVE TO DEVICE</button>
</div>

<script>
    let masterDB = {};

    async function syncAllData() {
        const status = document.getElementById('status');
        const url = "https://rotax-asia.com/api/1.1/obj/rmcmix";
        const key = "6ac15c905e322cb73104d71daa4ff681";
        
        status.innerHTML = "⏳ กำลังดึงข้อมูลขนาดใหญ่...";
        masterDB = {};

        // รายการฟิลด์ทั้งหมดที่คุณส่งมา (57 ฟิลด์)
        const targetFields = [
            'chassis_mark', 'chassis_no', 'cylinder_number', 'cylinder_number_2', 'engine_1', 'engine_2',
            'seal_1', 'seal_2', 'seal_exhaust', 'tyre_barcode', 'tyre_barcode_dry_spare', 'tyre_barcode_dry2',
            'tyre_barcode_dry3', 'tyre_barcode_dry4', 'tyre_barcode_dry5', 'tyre_barcode_dry6', 'tyre_barcode_dry7',
            'tyre_barcode_dry8', 'tyre_barcode_wet1', 'tyre_barcode_wet2', 'tyre_barcode_wet3', 'tyre_barcode_wet4',
            'tyre_barcode_wet5', 'tyre_serial', 'Seal 1', 'Chassis Mark'
        ];

        try {
            const res = await fetch(url + "?limit=100", { headers: { "Authorization": "Bearer " + key } });
            const data = await res.json();
            const results = data.response.results;

            let html = "";
            results.forEach(item => {
                // พยายามหาเบอร์รถจากทุกชื่อที่เป็นไปได้
                const kart = item['kart_number'] || item['kart_number_number'] || item['Kart_number'] || "??";
                const driver = item['driver_name'] || "Unknown";
                const cls = item['class_category'] || item['double_class_category'] || "-";
                const nation = item['driver_nation'] || "";

                let foundInRow = [];

                // 1. ตรวจสอบตาม Master List
                targetFields.forEach(f => {
                    if (item[f]) {
                        const val = item[f].toString().trim().toUpperCase();
                        if (val && val !== "0" && val !== "UNDEFINED") {
                            masterDB[val] = { kartNo: kart, driver: driver, class: cls, nation: nation, type: f.toUpperCase() };
                            foundInRow.push(f);
                        }
                    }
                });

                // 2. ตรวจสอบแบบกวาด (Auto-Scan) เผื่อชื่อฟิลด์มีเว้นวรรคที่ API ตรวจเจอ
                Object.keys(item).forEach(key => {
                    const val = item[key];
                    if (typeof val === 'string' && val.length > 4 && !targetFields.includes(key)) {
                        // ถ้าเจอค่าที่เป็นตัวอักษรยาวๆ และไม่ใช่ฟิลด์ระบบ
                        if (!['Created Date', 'Modified Date', '_id'].includes(key)) {
                            const cleanVal = val.trim().toUpperCase();
                            masterDB[cleanVal] = { kartNo: kart, driver: driver, class: cls, nation: nation, type: key.toUpperCase() };
                            foundInRow.push(key);
                        }
                    }
                });

                if (kart !== "??") {
                    html += `<tr>
                        <td style="font-weight:bold; color:var(--yellow)">#${kart}</td>
                        <td>${driver}<br><small>${cls}</small></td>
                        <td>${foundInRow.map(f => `<span class="tag">${f}</span>`).join('')}</td>
                    </tr>`;
                }
            });

            document.getElementById('previewBody').innerHTML = html;
            document.getElementById('previewTable').style.display = "table";
            document.getElementById('btnSave').style.display = "block";
            status.style.borderLeftColor = "var(--green)";
            status.innerHTML = `✅ ดึงสำเร็จ! พบนักแข่ง ${results.length} คน | บาร์โค้ดอุปกรณ์รวม ${Object.keys(masterDB).length} รายการ`;

        } catch (e) {
            status.innerHTML = "❌ ผิดพลาด: " + e.message;
        }
    }

    function saveToLocal() {
        localStorage.setItem('rotax_search_index', JSON.stringify(masterDB));
        alert("บันทึกข้อมูลสำเร็จ! พร้อมใช้งานหน้า Scanner");
        window.location.href = 'scanner.html';
    }
</script>
</body>
</html>
