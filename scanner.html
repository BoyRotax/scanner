<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Scanner - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #FFD700; --bg: #000; --red: #e30613; --green: #4ade80; --dark-card: #111; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* 1. NAVIGATION BAR */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px; background: #0a0a0a; border-bottom: 2px solid #222;
        }
        .nav-brand-group { display: flex; flex-direction: column; }
        .nav-brand { font-weight: 900; color: var(--red); font-size: 1.3rem; line-height: 1; letter-spacing: 1px; }
        .nav-company { font-size: 0.65rem; color: #555; letter-spacing: 1px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }

        .nav-menu { display: flex; gap: 8px; overflow-x: auto; }
        .nav-item { 
            text-decoration: none; color: #777; font-size: 0.75rem; border: 1px solid #333; 
            padding: 6px 12px; border-radius: 6px; font-weight: bold; white-space: nowrap; transition: 0.2s;
        }
        .nav-item.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,0,0.05); }

        /* 2. CLOCK & STATUS BAR */
        .status-bar { 
            display: flex; justify-content: flex-end; align-items: center;
            padding: 8px 20px; background: #050505; border-bottom: 1px solid #1a1a1a;
            font-size: 0.85rem;
        }
        #txtDate { color: #666; font-weight: bold; }
        #txtTime { color: var(--yellow); font-weight: 900; margin-left: 12px; font-family: monospace; font-size: 1.1rem; }

        /* 3. SCAN INPUT AREA */
        .scan-container { padding: 30px 20px; text-align: center; }
        #scanInput { 
            width: 100%; max-width: 650px; padding: 22px; font-size: 2.8rem; 
            border-radius: 18px; border: 4px solid #333; background: #000; color: #0f0; 
            text-align: center; font-weight: 900; outline: none; transition: 0.3s;
        }
        #scanInput:focus { border-color: var(--yellow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); }

        /* 4. RECENT SCANS */
        .recent-box { padding: 0 20px; max-width: 800px; margin: auto; }
        .recent-label { color: #444; font-size: 0.75rem; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 12px; }
        .recent-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--dark-card); padding: 12px 18px; border-radius: 10px; 
            margin-bottom: 8px; border-left: 6px solid var(--green);
            animation: slideIn 0.3s ease-out;
        }
        .recent-item.err { border-left-color: var(--red); opacity: 0.8; }
        .recent-info b { color: var(--yellow); font-size: 1.1rem; }
        .recent-info small { color: #888; display: block; margin-top: 2px; }
        
        .recent-time-box { text-align: right; font-family: monospace; line-height: 1.2; }
        .recent-date { font-size: 0.80rem; color: #666; font-weight: bold; }
        .recent-time { font-size: 1rem; color: #999; font-weight: bold; }

        /* 5. FULL SCREEN RESULT OVERLAY */
        #resultBox { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10000; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; pointer-events: none;
        }
        .found { background: var(--yellow) !important; color: #000 !important; display: flex !important; }
        .not-found { background: var(--red) !important; color: #fff !important; display: flex !important; }
        
        #resClass { background: rgba(0,0,0,0.85); color: white; padding: 8px 25px; border-radius: 10px; font-weight: bold; font-size: 1.5rem; }
        .kart-num { font-size: 32rem; font-weight: 600; line-height: 0.75; margin: 15px 0; letter-spacing: -8px; }
        .driver-name { font-size: 3.8rem; font-weight: 800; text-transform: uppercase; line-height: 1; }
        #resType { margin-top: 25px; font-size: 1.4rem; font-weight: bold; border: 3px solid currentColor; padding: 5px 20px; border-radius: 12px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand-group">
            <div class="nav-brand">ROTAX ASIA</div>
            <div class="nav-company">MOMENTS MEDIA ORGANIZING</div>
        </div>
        <div class="nav-menu">
            <a href="scanner.html" class="nav-item active">SCANNER</a>
            <a href="scanner-mo.html" class="nav-item">MOBILE</a>
            <a href="admin.html" class="nav-item">ADMIN</a>
            <a href="debug-data.html" class="nav-item">DEBUG-DATA</a>   
            <a href="sync-bubble.html" class="nav-item">SYNC CLOUD</a>
            <a href="view-database.html" class="nav-item">VIEW</a>
            <a href="history.html" class="nav-item">HISTORY</a>
        </div>
    </nav>

    <div class="status-bar">
        <span id="txtDate">-- --- ----</span>
        <span id="txtTime">00:00:00</span>
    </div>

    <div class="scan-container">
        <input type="text" id="scanInput" placeholder="READY TO SCAN" autofocus autocomplete="off">
    </div>

    <div class="recent-box">
        <div class="recent-label">RECENT 8 SCANS</div>
        <div id="recentList"></div>
    </div>

    <div id="resultBox">
        <div id="resClass">CLASS</div>
        <div class="kart-num" id="resKart">00</div>
        <div class="driver-name" id="resDriver">DRIVER NAME</div>
        <div id="resType">TYPE: --</div>
    </div>

    <script>
        // 1. ระบบนาฬิกา
        function updateClock() {
            const now = new Date();
            const dateOpt = { day: '2-digit', month: 'short', year: 'numeric' };
            document.getElementById('txtDate').innerText = now.toLocaleDateString('en-GB', dateOpt).toUpperCase();
            document.getElementById('txtTime').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);
        updateClock();

        const scanInput = document.getElementById('scanInput');
        const resBox = document.getElementById('resultBox');
        let isLock = false; 

        renderRecent();

        // 2. ระบบประมวลผลการสแกน (เพิ่มการเช็คความยาว)
        scanInput.addEventListener('input', function() {
            if (isLock) return; // ถ้ากำลังล็อกอยู่ ไม่ต้องทำอะไร
            
            const code = this.value.trim().toUpperCase();
            
            // --- แก้ไข: กำหนดความยาวบาร์โค้ดขั้นต่ำ ---
            const minLength = 4; // ปรับตัวเลขนี้ตามความยาวบาร์โค้ดจริง
            if (code.length < minLength) return; 
            // ------------------------------------

            isLock = true; // ล็อกทันทีเพื่อประมวลผล
            processData(code);
        });

        function processData(code) {
            const db = JSON.parse(localStorage.getItem('rotax_search_index')) || {};
            const match = db[code];
            
            const now = new Date();
            const logDate = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            const logTime = now.toLocaleTimeString('en-GB');

            resBox.style.display = 'flex';

            if (match) {
                resBox.className = 'found';
                document.getElementById('resKart').innerText = match.kartNo || "??";
                document.getElementById('resDriver').innerText = match.driver || "UNKNOWN";
                document.getElementById('resClass').innerText = match.class || "NO CLASS";
                document.getElementById('resType').innerText = `${match.type}: ${code}`;
                addLog(match.kartNo, match.driver, code, match.type, "OK", logDate, logTime);
                playBeep(850, 0.15);
            } else {
                resBox.className = 'not-found';
                document.getElementById('resKart').innerText = "??";
                document.getElementById('resDriver').innerText = "NOT IN SYSTEM";
                document.getElementById('resClass').innerText = "UNKNOWN";
                document.getElementById('resType').innerText = `INVALID: ${code}`;
                addLog("???", "Unknown", code, "ERROR", "ERR", logDate, logTime);
                playBeep(250, 0.4);
            }

            // แสดงผลค้างไว้ 2 วินาที
            setTimeout(() => {
                resBox.style.display = 'none';
                resBox.className = '';
                scanInput.value = '';
                isLock = false; // ปลดล็อกเพื่อให้สแกนอันต่อไปได้
                scanInput.focus();
                renderRecent();
            }, 2000);
        }

        // 3. ระบบจัดการประวัติ
        function addLog(kart, name, code, type, status, date, time) {
            let logs = JSON.parse(localStorage.getItem('scan_logs')) || [];
            logs.unshift({ kart, name, code, type, status, date, time });
            if (logs.length > 50) logs.pop(); 
            localStorage.setItem('scan_logs', JSON.stringify(logs));
        }

        function renderRecent() {
            const logs = JSON.parse(localStorage.getItem('scan_logs')) || [];
            const container = document.getElementById('recentList');
            container.innerHTML = logs.length === 0 ? "<div style='color:#222; text-align:center;'>WAITING FOR SCAN...</div>" : "";

            logs.slice(0, 8).forEach(log => {
                const item = document.createElement('div');
                item.className = `recent-item ${log.status === 'ERR' ? 'err' : ''}`;
                item.innerHTML = `
                    <div class="recent-info">
                        <b>#${log.kart} - ${log.name}</b>
                        <small>${log.type}: ${log.code}</small>
                    </div>
                    <div class="recent-time-box">
                        <div class="recent-date">${log.date}</div>
                        <div style="color:var(--yellow)">${log.time}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function playBeep(freq, dur) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'square'; osc.frequency.value = freq;
                osc.connect(g); g.connect(ctx.destination);
                osc.start();
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + dur);
                osc.stop(ctx.currentTime + dur);
            } catch(e) {}
        }

        // บังคับโฟกัสที่ช่อง Input เสมอ
        document.addEventListener('click', () => scanInput.focus());
        setInterval(() => { if(!isLock) scanInput.focus(); }, 1000);
    </script>
</body>

</html>
