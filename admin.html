<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual CSV - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e30613; --yellow: #FFD700; --bg: #000; --dark: #111; --border: #222; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* Navigation with Branding */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0a0a0a; border-bottom: 2px solid var(--border); }
        .nav-brand-group { display: flex; flex-direction: column; }
        .nav-brand { font-weight: 900; color: var(--red); font-size: 1.4rem; line-height: 1; }
        .nav-company { font-size: 0.65rem; color: #555; letter-spacing: 1px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }

        .nav-menu { display: flex; gap: 8px; overflow-x: auto; }
        .nav-item { text-decoration: none; color: #777; font-size: 0.75rem; border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-weight: bold; white-space: nowrap; text-transform: uppercase; }
        .nav-item.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255, 215, 0, 0.1); }
        .nav-menu::-webkit-scrollbar { display: none; }

        .status-bar { display: flex; justify-content: flex-end; padding: 8px 20px; background: #050505; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        #txtTime { color: var(--yellow); font-weight: 900; margin-left: 15px; font-family: monospace; }

        /* Content */
        .container { padding: 40px 20px; max-width: 600px; margin: auto; text-align: center; }
        .upload-card { background: var(--dark); padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
        
        .icon-box { font-size: 3rem; margin-bottom: 15px; }
        h2 { margin: 0 0 10px 0; color: var(--yellow); font-size: 1.5rem; }
        
        .file-label { display: block; background: #1a1a1a; border: 2px dashed #444; padding: 30px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .file-label:hover { border-color: var(--red); background: #222; }
        
        .btn-import { background: var(--red); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; }
        
        /* แก้ไขส่วนแสดงสถานะให้ทำงานแน่นอน */
        #statusDisplay { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: none; /* ปิดไว้ก่อน */
            font-size: 1rem; 
            line-height: 1.5;
        }
        .show-success { 
            display: block !important; 
            background: rgba(74, 222, 128, 0.1); 
            color: #4ade80; 
            border: 1px solid #4ade80; 
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand-group">
            <div class="nav-brand">ROTAX ASIA</div>
            <div class="nav-company">MOMENTS MEDIA ORGANIZING</div>
        </div>
        <div class="nav-menu">
            <a href="scanner.html" class="nav-item">SCANNER</a>
            <a href="admin.html" class="nav-item active">ADMIN</a>
            <a href="debug-data.html" class="nav-item">DEBUG-DATA</a>   
            <a href="sync-bubble.html" class="nav-item">SYNC CLOUD</a>
            <a href="view-database.html" class="nav-item">VIEW</a>
            <a href="history.html" class="nav-item">HISTORY</a>
        </div>
    </nav>

    <div class="status-bar">
        <span id="txtDate" style="color:#666">-- --- ----</span>
        <span id="txtTime">00:00:00</span>
    </div>

    <div class="container">
        <div class="upload-card">
            <div class="icon-box">📊</div>
            <h2>DATA_EXPORT_BOY MODE</h2>
            <p style="color:#888; font-size:0.8rem;">ระบบกำลังอ้างอิงหัวตารางจากไฟล์ CSV ล่าสุด</p>
            
            <label for="csvFile" class="file-label" id="dropLabel">
                <span id="fileName">เลือกไฟล์ csv</span>
            </label>
            <input type="file" id="csvFile" accept=".csv" style="display:none;" onchange="updateName()">
            
            <button class="btn-import" onclick="importCSV()">🚀 IMPORT CSV DATA</button>
            
            <div id="statusDisplay"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('txtDate').innerText = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
            document.getElementById('txtTime').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000); updateClock();

        function updateName() {
            const f = document.getElementById('csvFile').files[0];
            document.getElementById('fileName').innerText = f ? f.name : "เลือกไฟล์ .csv";
        }

        function importCSV() {
            const file = document.getElementById('csvFile').files[0];
            const display = document.getElementById('statusDisplay');
            
            if(!file) return alert("เลือกไฟล์ก่อนครับ");

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let newIndex = {};
                    let count = 0;

                    const barcodeFields = [
                        'engine_1_text', 'engine_2_text', 'seal_1_text', 'seal_2_text', 'seal_exhaust_text',
                        'chassis_no_text', 'cylinder_number_text', 'cylinder_number_2_text',
                        'tyre_barcode_text', 'tyre_barcode_dry2_text', 'tyre_barcode_dry3_text',
                        'tyre_barcode_dry4_text', 'tyre_barcode_dry5_text', 'tyre_barcode_dry6_text',
                        'tyre_barcode_dry7_text', 'tyre_barcode_dry8_text', 'tyre_barcode_dry9_text',
                        'tyre_barcode_wet1_text', 'tyre_barcode_wet2_text', 'tyre_barcode_wet3_text',
                        'tyre_barcode_wet4_text'
                    ];

                    results.data.forEach(row => {
                        const kart = row['kart_number_number'] || "??";
                        const driver = row['driver_name_text'] || "Unknown";
                        const cls = row['class_category_text'] || "";

                        barcodeFields.forEach(f => {
                            const val = row[f];
                            if(val && val.toString().trim() !== "" && val !== "-") {
                                const cleanVal = val.toString().trim().toUpperCase();
                                newIndex[cleanVal] = {
                                    driver: driver,
                                    kartNo: kart,
                                    class: cls,
                                    type: f.replace('_text', '').toUpperCase()
                                };
                                count++;
                            }
                        });
                    });

                    // บันทึกลงเครื่อง
                    localStorage.setItem('rotax_search_index', JSON.stringify(newIndex));
                    
                    // แสดงสถานะแจ้งเตือน
                    display.innerHTML = `✅ IMPORT SUCCESS!<br>พบข้อมูลอุปกรณ์ทั้งหมด ${count} รายการ<br>จากนักแข่ง ${results.data.length} ท่าน`;
                    display.className = "show-success";
                    
                    // แอบสั่นหรือแจ้งเตือนเพิ่มเผื่อมองไม่เห็น
                    console.log("Imported items:", count);
                }
            });
        }
    </script>
</body>
</html>
