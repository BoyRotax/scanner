<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; text-align: center; font-size: 1rem; outline: none; }
        input:focus { border-color: #e30613; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #e30613; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #b3050f; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="color:#e30613; margin:0;">ROTAX ASIA</h1>
        <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">Technical Inspection System</p>
        
        <input type="password" id="pw" placeholder="Enter password">
        <button id="loginBtn">LOGIN</button>
        
        <p style="font-size: .7rem; color:#e30613; margin-top: 25px;">MOMENTS MEDIA ORGANIZING &copy;Copyright</p>
    </div>

    <script>
        function doLogin() {
            var pass = document.getElementById('pw').value;
            var secret = "cm90YXgyMDI2"; 

            if (btoa(pass) === secret) {
                sessionStorage.setItem('isLoggedIn', 'true');
   
                window.location.href = "scanner.html";
            } else {
                alert("The password is incorrect Fuck U!!!!!!!.");
                document.getElementById('pw').value = "";
            }
        }

        document.getElementById('loginBtn').onclick = doLogin;

        document.getElementById('pw').onkeypress = function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        };
    </script>
</body>
</html>
