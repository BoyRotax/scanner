<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database View - Rotax Asia</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e30613; --yellow: #FFD700; --bg: #000; --dark: #111; --border: #222; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* Navbar Branding */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0a0a0a; border-bottom: 2px solid var(--border); }
        .nav-brand-group { display: flex; flex-direction: column; }
        .nav-brand { font-weight: 900; color: var(--red); font-size: 1.3rem; line-height: 1; }
        .nav-company { font-size: 0.65rem; color: #555; font-weight: bold; margin-top: 4px; text-transform: uppercase; }

        .nav-menu { display: flex; gap: 8px; overflow-x: auto; }
        .nav-item { text-decoration: none; color: #777; font-size: 0.75rem; border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-weight: bold; white-space: nowrap; }
        .nav-item.active { border-color: var(--yellow); color: var(--yellow); }

        .container { padding: 20px; }
        .search-box { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; }

        /* Table Style */
        .table-container { overflow-x: auto; background: var(--dark); border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #0a0a0a; color: var(--yellow); padding: 15px; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; }
        .btn-edit { background: none; border: 1px solid var(--yellow); color: var(--yellow); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-edit:hover { background: var(--yellow); color: black; }

        /* Modal Edit */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--yellow); width: 90%; max-width: 400px; }
        .modal-content h3 { margin-top: 0; color: var(--yellow); }
        .modal-content label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: #888; }
        .modal-content input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; background: var(--red); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #333; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand-group">
            <div class="nav-brand">ROTAX ASIA</div>
            <div class="nav-company">MOMENTS MEDIA ORGANIZING</div>
        </div>
        <div class="nav-menu">
            <a href="scanner.html" class="nav-item">SCANNER</a>
            <a href="admin.html" class="nav-item">ADMIN</a>
            <a href="view-database.html" class="nav-item active">VIEW</a>
            <a href="history.html" class="nav-item">HISTORY</a>
        </div>
    </nav>

    <div class="container">
        <h2>DATABASE VIEW</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="ค้นหาบาร์โค้ด, ชื่อนักแข่ง หรือเบอร์รถ..." onkeyup="renderTable()">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>BARCODE</th>
                        <th>KART</th>
                        <th>DRIVER</th>
                        <th>TYPE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="editTitle">EDIT DATA</h3>
            <input type="hidden" id="oldCode">
            
            <label>BARCODE (KEY)</label>
            <input type="text" id="editCode" readonly style="color:#666">

            <label>KART NUMBER</label>
            <input type="text" id="editKart">

            <label>DRIVER NAME</label>
            <input type="text" id="editDriver">

            <label>CLASS</label>
            <input type="text" id="editClass">

            <div class="modal-btns">
                <button class="btn-save" onclick="saveEdit()">SAVE CHANGES</button>
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        function renderTable() {
            const db = JSON.parse(localStorage.getItem('rotax_search_index')) || {};
            const query = document.getElementById('searchInput').value.toUpperCase();
            const body = document.getElementById('dbBody');
            body.innerHTML = "";

            Object.keys(db).forEach(code => {
                const item = db[code];
                if (code.includes(query) || item.driver.toUpperCase().includes(query) || item.kartNo.includes(query)) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:var(--yellow); font-family:monospace;">${code}</td>
                        <td><b>#${item.kartNo}</b></td>
                        <td>${item.driver}</td>
                        <td style="font-size:0.7rem; color:#666;">${item.type}</td>
                        <td><button class="btn-edit" onclick="openEdit('${code}')">EDIT</button></td>
                    `;
                    body.appendChild(tr);
                }
            });
        }

        function openEdit(code) {
            const db = JSON.parse(localStorage.getItem('rotax_search_index')) || {};
            const item = db[code];
            
            document.getElementById('oldCode').value = code;
            document.getElementById('editCode').value = code;
            document.getElementById('editKart').value = item.kartNo;
            document.getElementById('editDriver').value = item.driver;
            document.getElementById('editClass').value = item.class;
            
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveEdit() {
            const code = document.getElementById('editCode').value;
            const db = JSON.parse(localStorage.getItem('rotax_search_index')) || {};
            
            if (db[code]) {
                db[code].kartNo = document.getElementById('editKart').value;
                db[code].driver = document.getElementById('editDriver').value;
                db[code].class = document.getElementById('editClass').value;
                
                localStorage.setItem('rotax_search_index', JSON.stringify(db));
                alert("บันทึกข้อมูลเรียบร้อย!");
                closeModal();
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
